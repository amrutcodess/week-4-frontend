<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="form.css">
</head>
<body>
    <h1 align ="center">Forms

    </h1>
    <form >
        <div>
            <label for="username">Username</label>
            <input type="text" id="username" name="username" placeholder="Enter Username" required min="4" max="20">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Enter Password" required min="6" max="100">
            <button type="submit">Submit</button>
        </div>
        <div> <input type="checkbox" name="terms" id="terms"> <label for="terms">I agree to the terms and conditions</label> </div>
        <div> 
            <label for="feedback">Please provide feedback</label>
            <input type="text" id="feedback" name="feedback" placeholder="Enter feedback">
        </div>
        
    </form>
</body>
</html>
